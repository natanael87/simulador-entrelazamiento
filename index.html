<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Cuántico: Acción Fantasmagórica</title>
    <style>
        :root {
            --quantum-blue: #00d2ff;
            --quantum-purple: #9d50bb;
            --text-light: #e0e0e0;
            --bg-dark: #05050a;
            --label-bg: rgba(255, 255, 255, 0.7);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            color: var(--text-light);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .universe-background {
            position: absolute; width: 100%; height: 100%;
            background-image: url('galaxia.png');
            background-size: cover; background-position: center;
            z-index: -1; opacity: 0.8;
        }

        #viewport {
            flex-grow: 1; display: flex; justify-content: center;
            align-items: center; position: relative; overflow: hidden;
        }

        .particle {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; color: black;
            position: absolute; transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .particle-label {
            position: absolute; top: -32px; font-size: 16px; color: white;
            background: rgba(0, 0, 0, 0.6); padding: 2px 10px;
            border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #particle-a { background: var(--quantum-blue); box-shadow: 0 0 40px var(--quantum-blue); left: calc(50% - 35px); top: 50%; }
        #particle-b { background: var(--quantum-purple); box-shadow: 0 0 40px var(--quantum-purple); left: calc(50% + 5px); top: 50%; }

        /* --- AJUSTE: Hilo de Entrelazamiento más brillante --- */
        #string {
            position: absolute;
            height: 5px; /* Un poco más grueso */
            background: linear-gradient(90deg, var(--quantum-blue), #fff, var(--quantum-purple));
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 5;
            /* Efecto neón de alta intensidad */
            box-shadow: 0 0 20px var(--quantum-blue), 0 0 10px var(--quantum-purple), inset 0 0 5px white;
            border-radius: 3px;
        }

        #light-ray {
            position: absolute; width: 15px; height: 15px;
            background: #ffff00; border-radius: 50%;
            box-shadow: 0 0 15px #ffff00, 0 0 30px #ffcc00;
            opacity: 0; z-index: 6;
        }

        #light-label {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            color: black; font-weight: bold; font-size: 14px;
            padding: 2px 8px; background-color: var(--label-bg);
            border-radius: 5px; white-space: nowrap;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.9); border-top: 2px solid var(--quantum-blue);
            padding: 20px; height: 240px; display: flex;
            flex-direction: column; align-items: center; text-align: center;
            backdrop-filter: blur(10px); position: relative; z-index: 100;
        }

        .text-container {
            max-width: 800px; font-size: 17px; line-height: 1.5;
            margin-bottom: 20px; height: 130px; color: #d1d1d1; overflow-y: auto;
        }

        .controls { display: flex; gap: 15px; }

        button {
            padding: 10px 20px; border: none; border-radius: 4px;
            background: #222; color: white; cursor: pointer;
            font-weight: bold; text-transform: uppercase;
            border: 1px solid #444; transition: 0.3s;
        }

        button:hover:not(:disabled) { background: var(--quantum-blue); color: black; border-color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #btn-reset { border-color: #d9534f; }
        #btn-reset:hover { background: #d9534f; color: white; }
        .highlight { color: var(--quantum-blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="universe-background"></div>

<div id="viewport">
    <div id="string"></div>
    <div id="light-ray"><span id="light-label">Velocidad de la luz &rarr;</span></div>
    
    <div id="particle-a" class="particle">
        <span class="particle-label">A</span>
        <span id="state-a">?</span>
    </div>
    <div id="particle-b" class="particle">
        <span class="particle-label">B</span>
        <span id="state-b">?</span>
    </div>
</div>

<div class="info-panel">
    <div class="text-container" id="narration">
        <br><strong>Bienvenido al simulador. El sistema tiene un espín total de cero. Haz clic en "Generar Par" para presenciar la separación de dos partículas entrelazadas hacia los confines del universo.</strong>
    </div>
    <div class="controls">
        <button id="btn-gen">Generar Par</button>
        <button id="btn-measure" disabled>Medir Partícula A</button>
        <button id="btn-interpret" disabled>Interpretación</button>
        <button id="btn-reset">Reiniciar</button> 
    </div>
</div>

<script>
    const pA = document.getElementById('particle-a');
    const pB = document.getElementById('particle-b');
    const stateA = document.getElementById('state-a');
    const stateB = document.getElementById('state-b');
    const string = document.getElementById('string');
    const ray = document.getElementById('light-ray');
    const narration = document.getElementById('narration');
    const btnGen = document.getElementById('btn-gen');
    const btnMeasure = document.getElementById('btn-measure');
    const btnInterpret = document.getElementById('btn-interpret');
    const btnReset = document.getElementById('btn-reset');

    let timeoutString, timeoutAnim;

    btnGen.onclick = () => {
        pA.style.left = "calc(50% - 35px)";
        pB.style.left = "calc(50% + 5px)";
        pA.style.top = "50%";
        pB.style.top = "50%";
        stateA.innerHTML = "?";
        stateB.innerHTML = "?";
        pA.style.transform = "none";
        pB.style.transform = "none";
        string.style.opacity = "0";
        ray.style.opacity = "0";
        btnMeasure.disabled = true;
        btnInterpret.disabled = true;

        narration.innerHTML = `<span class="highlight">Fase de Incertidumbre:</span> Las partículas no poseen propiedades definidas 'en sí mismas' antes de la medición, existen en una superposición dentro del <br><strong>espacio de configuración</strong>. La línea brillante representa su conexión cuántica indivisible.`;

        timeoutAnim = setTimeout(() => {
            pA.animate([{ left: '15%' }], { duration: 3000, easing: 'ease-out', fill: 'forwards' });
            pB.animate([{ left: '85%' }], { duration: 3000, easing: 'ease-out', fill: 'forwards' });
            
            timeoutString = setTimeout(() => {
                const rectA = pA.getBoundingClientRect();
                const rectB = pB.getBoundingClientRect();
                const startX = rectA.right + 10;
                const endX = rectB.left - 10;
                string.style.width = (endX - startX) + "px";
                string.style.left = startX + "px";
                string.style.top = (rectA.top + rectA.height/2 - 4) + "px";
                
                /* AJUSTE: Opacidad aumentada a 0.9 para máxima visibilidad */
                string.style.opacity = "0.9"; 
                
                btnMeasure.disabled = false;
            }, 3000);
        }, 100);

        btnGen.disabled = true;
    };

    btnMeasure.onclick = () => {
        const resultA = Math.random() > 0.5 ? "↑" : "↓";
        const resultB = resultA === "↑" ? "↓" : "↑";
        stateA.innerHTML = resultA;
        stateB.innerHTML = resultB;
        pA.style.transform = "scale(1.2)";
        pB.style.transform = "scale(1.2)";
        string.style.opacity = "0";

        narration.innerHTML = `<span class="highlight">El Acto de Medición:</span> Al definir el estado de A, la partícula B adquiere instantáneamente el valor opuesto para cumplir con las leyes de conservación. No hubo tiempo para que A le enviara un WhatsApp o una señal de luz a B. Esto es <br><strong>No-localidad</strong>.`;

        const rectA = pA.getBoundingClientRect();
        const rectB = pB.getBoundingClientRect();
        ray.style.left = rectA.right + "px";
        ray.style.top = (rectA.top + rectA.height/2) + "px";
        ray.style.opacity = "1";
        ray.animate([{ left: rectA.right + 'px' }, { left: rectB.left + 'px' }], { duration: 5000, iterations: 1 });

        btnMeasure.disabled = true;
        btnInterpret.disabled = false;
    };

    btnInterpret.onclick = () => {
        narration.innerHTML = `<span class="highlight">La Pregunta Ontológica:</span> ¿Es la 'separación' solo una ilusión de nuestros sentidos? ¿Las partículas ya tenían esa información grabada (como los calcetines de Bertlmann que se eligen en la mañana)? ¿Estaba el resultado ya decidido o el universo está conectado de forma no-local? Aquí es donde la ciencia llega a su límite y comienza tu postura filosófica.`;
        btnInterpret.disabled = true;
    };

    btnReset.onclick = () => {
        clearTimeout(timeoutAnim);
        clearTimeout(timeoutString);
        document.getAnimations().forEach(anim => anim.cancel());
        pA.style.left = "calc(50% - 35px)";
        pB.style.left = "calc(50% + 5px)";
        pA.style.top = "50%";
        pB.style.top = "50%";
        pA.style.transform = "none";
        pB.style.transform = "none";
        stateA.innerHTML = "?";
        stateB.innerHTML = "?";
        string.style.opacity = "0";
        string.style.width = "0px";
        ray.style.opacity = "0";
        btnGen.disabled = false;
        btnMeasure.disabled = true;
        btnInterpret.disabled = true;
        narration.innerHTML = `<br><strong>Bienvenido al simulador. El sistema tiene un espín total de cero. Haz clic en "Generar Par" para comenzar.</strong>`;
    };
</script>
</body>
</html>
